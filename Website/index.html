<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy DevOps Bird</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#87CEEB;
    font-family:Arial,sans-serif;
}

#game{
    width:500px;
    height:700px;
    border:4px solid #222;
    position:relative;
    overflow:hidden;
    background:linear-gradient(#6ec6ff,#d6f4ff);
}

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:100px;
    background:#8B4513;
}

#grass{
    position:absolute;
    bottom:90px;
    width:100%;
    height:15px;
    background:#3CB371;
}

#bird{
    width:45px;
    height:35px;
    background:gold;
    border-radius:50%;
    position:absolute;
    left:100px;
    top:250px;
}

#bird::before{
    content:"";
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
    position:absolute;
    top:8px;
    right:8px;
}

#bird::after{
    content:"";
    width:18px;
    height:8px;
    background:orange;
    position:absolute;
    right:-10px;
    top:14px;
    clip-path: polygon(0 0,100% 50%,0 100%);
}

.pipe{
    position:absolute;
    width:70px;
    background:green;
    border:3px solid darkgreen;
}

#score{
    position:absolute;
    top:15px;
    left:20px;
    font-size:32px;
    font-weight:bold;
    color:white;
    text-shadow:2px 2px 4px black;
    z-index:100;
}

#startScreen,
#gameOver{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:200;
}

#gameOver{
    display:none;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    cursor:pointer;
    border-radius:8px;
    margin-top:15px;
}
</style>
</head>
<body>

<div id="game">

<div id="score">0</div>

<div id="bird"></div>

<div id="grass"></div>
<div id="ground"></div>

<div id="startScreen">
    <h1>Flappy DevOps Bird</h1>
    <p>Press Space or Click</p>
    <button onclick="startGame()">Start</button>
</div>

<div id="gameOver">
    <h1>Game Over</h1>
    <h2 id="finalScore"></h2>
    <button onclick="restartGame()">Restart</button>
</div>

</div>

<script>

const game = document.getElementById("game");
const bird = document.getElementById("bird");
const scoreDisplay = document.getElementById("score");

let birdY = 250;
let velocity = 0;
let gravity = 0.45;
let gameStarted = false;
let gameEnded = false;
let score = 0;
let pipes = [];

function flap(){
    if(!gameStarted || gameEnded) return;
    velocity = -8;
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"){
        e.preventDefault();
        flap();
    }
});

document.addEventListener("click",()=>{
    flap();
});

function startGame(){

    document.getElementById("startScreen").style.display="none";

    gameStarted=true;

    gameLoop();
    pipeGenerator();
}

function gameLoop(){

    if(gameEnded) return;

    velocity += gravity;
    birdY += velocity;

    bird.style.top = birdY+"px";

    if(birdY <=0 || birdY >=565){
        endGame();
    }

    movePipes();

    requestAnimationFrame(gameLoop);
}

function pipeGenerator(){

    if(gameEnded) return;

    createPipe();

    setTimeout(pipeGenerator,2000);
}

function createPipe(){

    const gap = 180;

    const topHeight = Math.floor(Math.random()*250)+50;

    const bottomHeight = 700-topHeight-gap-100;

    const topPipe = document.createElement("div");
    topPipe.classList.add("pipe");
    topPipe.style.height=topHeight+"px";
    topPipe.style.left="500px";
    topPipe.style.top="0";

    const bottomPipe = document.createElement("div");
    bottomPipe.classList.add("pipe");
    bottomPipe.style.height=bottomHeight+"px";
    bottomPipe.style.left="500px";
    bottomPipe.style.bottom="100px";

    game.appendChild(topPipe);
    game.appendChild(bottomPipe);

    pipes.push({
        top:topPipe,
        bottom:bottomPipe,
        passed:false
    });
}

function movePipes(){

    pipes.forEach(pipe=>{

        let left=parseInt(pipe.top.style.left);

        left-=3;

        pipe.top.style.left=left+"px";
        pipe.bottom.style.left=left+"px";

        if(!pipe.passed && left<100){

            pipe.passed=true;
            score++;

            scoreDisplay.textContent=score;
        }

        if(checkCollision(pipe)){
            endGame();
        }
    });

    pipes=pipes.filter(pipe=>{

        let left=parseInt(pipe.top.style.left);

        if(left<-80){

            pipe.top.remove();
            pipe.bottom.remove();

            return false;
        }

        return true;
    });
}

function checkCollision(pipe){

    const birdRect=bird.getBoundingClientRect();

    const topRect=pipe.top.getBoundingClientRect();
    const bottomRect=pipe.bottom.getBoundingClientRect();

    return(
        birdRect.left<topRect.right &&
        birdRect.right>topRect.left &&
        birdRect.top<topRect.bottom &&
        birdRect.bottom>topRect.top
    ) || (
        birdRect.left<bottomRect.right &&
        birdRect.right>bottomRect.left &&
        birdRect.top<bottomRect.bottom &&
        birdRect.bottom>bottomRect.top
    );
}

function endGame(){

    gameEnded=true;

    document.getElementById("finalScore").innerText=
    "Score: "+score;

    document.getElementById("gameOver").style.display="flex";
}

function restartGame(){

    location.reload();
}

</script>

</body>
</html>
